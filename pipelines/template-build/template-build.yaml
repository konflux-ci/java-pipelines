# This build pipeline template is intended to be processed by scripts
# under hack/ directory rather than by kustomize directly.

apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: template-build
  labels:
    "pipelines.openshift.io/used-by": ""
    "pipelines.openshift.io/runtime": ""
    "pipelines.openshift.io/strategy": ""
spec:
  params:
    - description: 'Source Repository URL'
      name: git-url
      type: string
    - description: 'Revision of the Source Repository'
      name: revision
      type: string
      default: ""
    - description: 'Fully Qualified Output Image'
      name: output-image
      type: string
    - description: Skip checks against built image
      name: skip-checks
      type: string
      default: "false"
    - description: Execute the build with network isolation
      name: hermetic
      type: string
      default: "false"
    - description: Build dependencies to be prefetched
      name: prefetch-input
      type: string
      default: ""
    - description: Image tag expiration time, time values could be something like 1h, 2d, 3w for hours, days, and weeks, respectively.
      name: image-expires-after
      type: string
      default: ""
    - name: build-source-image
      description: Build a source image.
      type: string
      default: "false"
    - name: enable-cache-proxy
      description: Enable cache proxy configuration
      default: "false"
    - name: enable-package-registry-proxy
      description: Use the package registry proxy when prefetching dependencies
      default: "true"
    - name: sast-target-dirs
      description: Target directories in component's source code to scan with SAST tools. Multiple values should be separated with commas.
      type: string
      default: "."
  tasks:
    - name: init
      params:
        - name: enable-cache-proxy
          value: "$(params.enable-cache-proxy)"
      taskRef:
        name: init
        # A pointer for referencing the correct version of task in the built pipeline bundles.
        version: "0.4"
    - name: clone-repository
      runAfter:
        - init
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: "$(params.revision)"
      taskRef:
        name: git-clone
        version: "0.1"
      workspaces:
        - name: output
          workspace: workspace
        - name: basic-auth
          workspace: git-auth
    - name: prefetch-dependencies
      params:
        - name: input
          value: $(params.prefetch-input)
        - name: enable-package-registry-proxy
          value: "$(params.enable-package-registry-proxy)"
      runAfter:
        - clone-repository
      taskRef:
        name: prefetch-dependencies
        version: "0.3"
      workspaces:
        - name: source
          workspace: workspace
        - name: git-basic-auth
          workspace: git-auth
        - name: netrc
          workspace: netrc
    - name: build-oci-artifact
      runAfter:
        - prefetch-dependencies
      taskRef:
        name: $REPLACE_ME
      workspaces:
        - name: source
          workspace: workspace
    - name: build-source-image
      when:
        - input: $(params.build-source-image)
          operator: in
          values: ["true"]
      runAfter:
        - build-oci-artifact
      taskRef:
        name: source-build
        version: "0.3"
      params:
        - name: BINARY_IMAGE
          value: "$(tasks.build-oci-artifact.results.IMAGE_URL)"
        - name: BINARY_IMAGE_DIGEST
          value: "$(tasks.build-oci-artifact.results.IMAGE_DIGEST)"
      workspaces:
        - name: workspace
          workspace: workspace
    - name: sast-snyk-check
      when:
      - input: $(params.skip-checks)
        operator: in
        values: ["false"]
      runAfter:
        - build-oci-artifact
      taskRef:
        name: sast-snyk-check
        version: "0.4"
      workspaces:
      - name: workspace
        workspace: workspace
      params:
      - name: image-digest
        value: $(tasks.build-oci-artifact.results.IMAGE_DIGEST)
      - name: image-url
        value: $(tasks.build-oci-artifact.results.IMAGE_URL)
      - name: TARGET_DIRS
        value: $(params.sast-target-dirs)
    - name: apply-tags
      runAfter:
        - build-oci-artifact
      taskRef:
        name: apply-tags
        version: "0.3"
      params:
      - name: IMAGE_URL
        value: $(tasks.build-oci-artifact.results.IMAGE_URL)
      - name: IMAGE_DIGEST
        value: $(tasks.build-oci-artifact.results.IMAGE_DIGEST)
  finally: []
  results:
    - name: IMAGE_URL
      value: "$(tasks.build-oci-artifact.results.IMAGE_URL)"
    - name: IMAGE_DIGEST
      value: "$(tasks.build-oci-artifact.results.IMAGE_DIGEST)"
    - name: CHAINS-GIT_URL
      value: "$(tasks.clone-repository.results.url)"
    - name: CHAINS-GIT_COMMIT
      value: "$(tasks.clone-repository.results.commit)"
  workspaces:
    - name: workspace
    - name: git-auth
      optional: true
    - name: netrc
      optional: true
